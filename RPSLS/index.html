<!doctype html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
    integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
  <title>Bazinga! RPSLS</title>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-6">
        <img class="The Big bang Theory Bazinga! logo" src="./images/download.jpg" height=50%>
      </div>
      <div class="col-6">
        <p class="score mt-4" id="scoreCount">score: </p>
      </div>
    </div>
  </div>
  <div class="container">
    <div class="ro">
      <div class="col-2">
        <p class="playBestOf" id="playersCount">Players:</p>
          <div class="btn-group" role="group" aria-label="Basic example">
            <button type="button" id="p1Btn" class="btn btn-secondary playBestOfBtn">1</button>
            <button type="button" id=p2Btn class="btn btn-secondary playBestOfBtn">2</button>
          </div>
        </br>
          <p class="playBestOf mt-3" id="bestOfCount">Best of:</p>
          <div class="btn-group" role="group" aria-label="Basic example">
            <button type="button" id="win3" class="btn btn-secondary playBestOfBtn">3</button>
            <button type="button" id="win5" class="btn btn-secondary playBestOfBtn">5</button>
            <button type="button" id="win7" class="btn btn-secondary playBestOfBtn">7</button>
          </div>
      </div>
    </div>
  </div>
</br>
  <div class="container bazingaFont">
    <div class="row">
      <div class="col-12">
          <div class="jumbotron videogameBG">
            <h1 class="display-4 bazingaRpsls">Bazinga! Rock.Paper.Scissors.Lizard.Spock</h1>
            <hr class="my-3">
            <p id="instructions">To start the game, first choose the amount of players and select the desired amount of rounds, then make your R.P.S.L.S selection.</p> </p>
            <hr class="my-5">
            <p class = "nextText">Make sure to click next after each result populates</p>
            <a class="btn btn-success btn-lg nextBtn" id="nextBtn" href="#" role="button">Next</a>
            </br>
            <div class="btn-group rpslsBtns mt-3" role="group" aria-label="Basic example">
              <button type="button" id="rockBtn" class="btn btn-danger rpslsBtns ">Rock</button>
              <button type="button" id="paperBtn" class="btn btn-danger rpslsBtns">Paper</button>
              <button type="button" id="scissorsBtn" class="btn btn-danger rpslsBtns">Scissors</button>
              <button type="button" id="lizardBtn" class="btn btn-danger rpslsBtns">Lizard</button>
              <button type="button" id="spockBtn" class="btn btn-danger rpslsBtns">Spock</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>









  <!-- Optional JavaScript; choose one of the two! -->

  <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
    crossorigin="anonymous"></script>
  <script type="module" src="js/script.js"></script>
  <!-- Option 2: jQuery, Popper.js, and Bootstrap JS
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js" integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s" crossorigin="anonymous"></script>
    -->
</body>

</html>
